    <main>
        <div class="container-fliud py-4 px-5 ">
             <div class="row d-flex justify-content-center flex-direction-column">
                <div class="col ">
                    <h4 class="text-center border-bottom border-black pb-4">Chapter # 15-20 |Array: its Methods and for loops</h4>

        <div class="container-fluid px-5 d-flex justify-content-between" style="display: flex; gap: 40px;">

                <div class="seer px-5 py-5 border border-dark">
                        <div class="input-group mb-3">
 
  <input type="text" class="form-control" placeholder="Enter your text" aria-label="Example text with button addon" aria-describedby="clearInput" id="input">
   <button class="btn btn-outline-secondary" type="button" onclick ="clearInput();" >Clear</button>
</div>
                </div>
             </div>

             <div style="width: 50%;">

                <div class=" text-center"><h3>Buttons</h3></div>
                <div class="buttonall border border-1 border-dark  text-center px-5 pt-5 pb-5">
                      <button type="button" onclick="simpleAlert();" class="btn btn-primary mb-2" id="">Simple Alert</button>
                     <button type="button" class="btn btn-primary mb-2" onclick="printName()" id="">Printf My Name</button>
                     <button type="button" class="btn btn-primary mb-2" onclick="printCities();">Print All Cities</button>
                     <button type="button" class="btn btn-primary mb-2" onclick="addCity();">Add your cities in list</button>
                     <button type="button" class="btn btn-primary mb-2" onclick="generateTable();">Generate Table</button>
                     <button type="button" class="btn btn-primary mb-2" onclick="lowerCase();">Convert to lowerCase</button>
                     <button type="button" class="btn btn-primary mb-2" onclick="upperCase();">Conver to upperCase</button>
                     <button type="button" class="btn btn-primary mb-2" onclick="capiTalize();">Convert to Captilize</button>
                     <button type="button" class="btn btn-primary mb-2" onclick="betterFormatting();">Better Formatting</button>
